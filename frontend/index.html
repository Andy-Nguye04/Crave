        background: rgba(248, 250, 246, 0.7);

      }
      .botanical-gradient {
        background: linear-gradient(135deg, #0f5238 0%, #2d6a4f 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Hero Background Section -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent z-10"></div>
<img alt="Crave Culinary Experience" class="w-full h-full object-cover" data-alt="high-end editorial food photography of a rustic gourmet harvest bowl with fresh greens, seeds, and roasted vegetables under soft natural morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8uRfXm3swg8laVnK1r07oBDxXyHuCW-n_BM5IrqYm-2VAVpq7kcjQoK5EFr9v2vDNArF-c-Tq2sJW0u4OGU4aWzfkJIBQ8YaqD8V6n7h3jml883lbjki124dKZOLiakAj7DyS5LYaqPxCPKc893fTakC7oUDeErqPu3E2nkDXVXJx6v_RRB_LyzDo33j_kexVObRftADs9mBDC-Y-eB8GHLpX9d0-b9NA70-FvTCZFarhskV1aCkapgxCKfsERjKVPSS4taZae-E"/>
</div>
<!-- Main Content Canvas -->
<main class="relative z-20 min-h-screen flex items-center justify-center px-6 py-12">
<!-- Login Container -->
<div class="w-full max-w-md">
<!-- Brand Anchor (Simplified for Login Context) -->
<div class="text-center mb-10 space-y-3">
<h1 class="font-headline text-5xl font-extrabold tracking-tight text-primary">Crave</h1>
<div class="space-y-1">
<h2 class="font-headline text-2xl font-bold text-on-surface">Welcome to Crave</h2>
<p class="text-on-surface-variant font-medium">Your social feed, cooked.</p>
</div>
</div>
<!-- Login Card -->
<div class="glass-morphism p-8 md:p-10 rounded-[2rem] shadow-2xl shadow-on-surface/5 border border-outline-variant/10">
<!-- Social Login Cluster -->
<div class="space-y-4 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-surface-container-lowest rounded-full text-on-surface font-semibold border border-outline-variant/15 hover:bg-surface-container-high transition-all active:scale-[0.98]">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                        Continue with Google
                    </button>
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-on-surface text-surface rounded-full font-semibold hover:opacity-90 transition-all active:scale-[0.98]">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96 0-2.04-.6-3.23-.6-1.2 0-2.1.56-3.08.56-1.41 0-3.38-1.74-4.59-3.48-2.2-3.14-2.81-7.25-1.12-9.68.86-1.21 2.33-1.98 3.73-1.98 1.14 0 2.01.62 2.88.62.83 0 1.64-.62 2.95-.62 1.25 0 2.44.57 3.22 1.54-2.58 1.29-2.14 4.8.44 5.92-.89 2.05-2.07 4.09-3.2 5.72-.37.53-.74 1.01-1 1.01zm-2.08-16.14c.77-.96 1.25-2.26 1.1-3.56-1.07.05-2.39.73-3.15 1.66-.71.85-1.29 2.16-1.14 3.43 1.2.09 2.39-.56 3.19-1.53z"></path>
</svg>
                        Continue with Apple
                    </button>
</div>
<!-- Separator -->
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-on-surface-variant font-label text-xs font-bold uppercase tracking-widest">Or email</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
                <!-- Email Form -->
                <div id="auth-error" class="hidden mb-6 p-4 rounded-xl bg-error/10 text-error text-center font-bold text-sm"></div>
                
                <form id="login-form" class="space-y-6">
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-4" for="email">Email Address</label>
<input class="w-full px-6 py-4 bg-surface-container-high rounded-full border-none focus:ring-2 focus:ring-primary-fixed focus:bg-primary-fixed/10 transition-all placeholder:text-outline/50 outline-none" id="email" placeholder="chef@crave.app" type="email"/>
</div>
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-4" for="password">Password</label>
<input class="w-full px-6 py-4 bg-surface-container-high rounded-full border-none focus:ring-2 focus:ring-primary-fixed focus:bg-primary-fixed/10 transition-all placeholder:text-outline/50 outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-end px-4">
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
                    <button class="w-full botanical-gradient py-4 rounded-full text-on-primary font-bold text-lg shadow-xl shadow-primary/20 hover:shadow-primary/30 active:scale-[0.97] transition-all" type="submit">
                        Sign In
                    </button>
</form>
<!-- Footer Sign Up -->
<p class="mt-8 text-center text-on-surface-variant font-medium">
                    Don't have a kitchen yet? 
                    <a class="text-primary font-bold hover:underline" href="signup.html">Join the club</a>
</p>
</div>
<!-- Accessibility/Legal Links -->
<div class="mt-12 flex justify-center gap-6 text-on-surface-variant/60 font-label text-[10px] uppercase tracking-widest font-bold">
<a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<a class="hover:text-on-surface transition-colors" href="#">Cookies</a>
</div>
</div>
</main>
    <!-- Navigation suppression check: TopAppBar and BottomNavBar are hidden for transactional/focus pages like Login -->
    <script src="js/auth.js"></script>
</body></html>
