<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Crave - Notifications</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f5238",
                        "primary-fixed": "#b1f0ce",
                        "on-surface": "#191c1a",
                        "on-surface-variant": "#404943",
                        "background": "#f8faf6",
                        "surface-container": "#eceeea",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f4f0",
                        "surface-container-high": "#e7e9e5",
                        "outline": "#707973",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { min-height: max(884px, 100dvh); }
    </style>
</head>
<body class="bg-background text-on-surface font-body">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-[#f8faf6]/70 backdrop-blur-3xl flex items-center px-6 py-4 border-b border-outline/10">
        <button class="text-[#0f5238] scale-95 active:scale-90 transition-transform hover:opacity-80 p-2 -ml-2 rounded-full" onclick="window.location.href='profile.html'">
            <span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="font-headline font-bold text-xl text-[#0f5238] ml-2 flex-1">Notifications</h1>
    </header>

    <main class="pt-24 pb-12 px-6 max-w-2xl mx-auto min-h-screen">
        
        <p class="text-on-surface-variant text-sm mb-6 px-2">Control which alerts you receive to stay focused in the kitchen.</p>

        <section class="bg-surface-container-low rounded-[2rem] p-6 mb-8">
            <h2 class="font-headline font-bold text-lg mb-4 text-on-surface">Cooking & Recipes</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-[#bbefc4]/30 flex items-center justify-center text-[#396847]">
                            <span class="material-symbols-outlined" data-icon="timer">timer</span>
                        </div>
                        <div>
                            <span class="font-headline font-semibold text-on-surface block">Smart Timers</span>
                            <span class="text-xs text-on-surface-variant">Alerts when cooking steps complete</span>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>

                <div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-[#bbefc4]/30 flex items-center justify-center text-[#396847]">
                            <span class="material-symbols-outlined" data-icon="new_releases">new_releases</span>
                        </div>
                        <div>
                            <span class="font-headline font-semibold text-on-surface block">New Extraction</span>
                            <span class="text-xs text-on-surface-variant">When recipe parsing is ready</span>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>
            </div>
        </section>

        <section class="bg-surface-container-low rounded-[2rem] p-6">
            <h2 class="font-headline font-bold text-lg mb-4 text-on-surface">Community & Social</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-[#bbefc4]/30 flex items-center justify-center text-[#396847]">
                            <span class="material-symbols-outlined" data-icon="group">group</span>
                        </div>
                        <div>
                            <span class="font-headline font-semibold text-on-surface block">Friends Activity</span>
                            <span class="text-xs text-on-surface-variant">When friends post a new master dish</span>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer">
                        <div class="w-11 h-6 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>
            </div>
        </section>

    </main>
</body>
</html>
